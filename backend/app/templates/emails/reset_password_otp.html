<!doctype html>
<html>
  <body style="font-family: Arial, sans-serif; background-color: #f4f5f7; padding: 32px 0; margin: 0;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table role="presentation" width="480" cellpadding="0" cellspacing="0"
                 style="background-color: #ffffff; border-radius: 8px; padding: 32px;">
            <tr>
              <td>
                <h2 style="color: #111827; margin-top: 0;">Reset your password</h2>
                <p style="color: #374151; font-size: 15px; line-height: 1.5;">
                  Enter this code to reset your password:
                </p>
                <p style="text-align: center; margin: 32px 0;">
                  <span style="display: inline-block; background-color: #eff6ff; color: #1d4ed8;
                               font-size: 36px; font-weight: bold; letter-spacing: 10px;
                               padding: 16px 24px; border-radius: 8px; font-family: 'Courier New', monospace;">
                    {{ otp }}
                  </span>
                </p>
                <p style="color: #6b7280; font-size: 13px; line-height: 1.5; text-align: center;">
                  This code expires in {{ expire_minutes }} minutes.
                </p>
                <p style="color: #9ca3af; font-size: 12px; margin-top: 32px;">
                  If you didn't request a password reset, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
